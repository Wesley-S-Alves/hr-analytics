name: CI — Testes e Validação

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint e Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install ruff mypy

      - name: Ruff (lint)
        run: ruff check src/ tests/

      - name: Ruff (format)
        run: ruff format --check src/ tests/

  test:
    name: Testes Unitários
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Rodar testes com cobertura
        run: pytest --cov=src/hr_analytics --cov-report=xml --cov-report=term-missing -v

      - name: Upload cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t hr-analytics:test .

      - name: Verificar que a imagem sobe
        run: |
          docker run -d --name hr-test -p 8000:8000 hr-analytics:test
          sleep 5
          docker logs hr-test
          docker stop hr-test
          docker rm hr-test
